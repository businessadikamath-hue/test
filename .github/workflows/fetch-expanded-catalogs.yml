name: Fetch official Azure learning catalog
on:
  pull_request:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch and normalize official Azure documentation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml
          mkdir -p catalogs repos
          git clone --depth 1 --filter=blob:none --sparse https://github.com/MicrosoftDocs/azure-docs.git repos/azure-docs
          git -C repos/azure-docs sparse-checkout set articles/ai-services articles/app-service articles/azure-functions articles/virtual-machines articles/storage articles/networking
          python - <<'PY'
          import json, re
          from pathlib import Path
          import yaml

          def frontmatter(text):
              if not text.startswith('---'): return {}
              parts=text.split('---',2)
              if len(parts)<3: return {}
              try: return yaml.safe_load(parts[1]) or {}
              except Exception: return {}

          rows=[]; root=Path('repos/azure-docs/articles')
          for p in root.rglob('*.md'):
              try: text=p.read_text(encoding='utf-8')
              except Exception: continue
              fm=frontmatter(text)
              title=str(fm.get('title') or fm.get('titleSuffix') or '').strip()
              desc=str(fm.get('description') or '').strip()
              if not title: continue
              rel=p.relative_to(root).as_posix()[:-3]
              if rel.endswith('/index'): rel=rel[:-6]
              url='https://learn.microsoft.com/azure/'+rel.strip('/')
              rows.append({'source':'Microsoft Azure Documentation','id':'azure-docs:'+rel,'title':title,'summary':desc,'url':url,'type':str(fm.get('ms.topic') or 'documentation')})
          ded=[]; seen=set()
          for x in rows:
              k=x['url'].rstrip('/').casefold()
              if k in seen: continue
              seen.add(k); ded.append(x)
          json.dump(ded,open('catalogs/azure-documentation.json','w',encoding='utf-8'),ensure_ascii=False)
          stats={'total':len(ded)}
          json.dump(stats,open('catalogs/stats.json','w'),indent=2)
          print(json.dumps(stats,indent=2))
          PY
      - name: Upload catalog
        uses: actions/upload-artifact@v4
        with:
          name: official-azure-documentation-catalog
          path: catalogs/
          retention-days: 1
