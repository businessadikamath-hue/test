name: Fetch official .NET documentation catalog
on:
  pull_request:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract provider-maintained .NET documentation catalog
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml
          mkdir -p catalogs repos
          git clone --depth 1 https://github.com/dotnet/docs.git repos/dotnet-docs
          python - <<'PY'
          import json, re
          from pathlib import Path
          import yaml

          def frontmatter(text):
              if not text.startswith('---'):
                  return {}
              parts = text.split('---', 2)
              if len(parts) < 3:
                  return {}
              try:
                  return yaml.safe_load(parts[1]) or {}
              except Exception:
                  return {}

          rows = []
          root = Path('repos/dotnet-docs/docs')
          for p in root.rglob('*.md'):
              try:
                  text = p.read_text(encoding='utf-8')
              except Exception:
                  continue
              meta = frontmatter(text)
              title = str(meta.get('title') or '').strip()
              description = str(meta.get('description') or '').strip()
              if not title:
                  match = re.search(r'^#\s+(.+?)\s*$', text, re.MULTILINE)
                  title = match.group(1).strip() if match else ''
              if not title:
                  continue
              rel = p.relative_to(root).as_posix()[:-3]
              if rel.endswith('/index'):
                  rel = rel[:-6]
              url = 'https://learn.microsoft.com/dotnet/' + rel.strip('/')
              rows.append({
                  'source': '.NET Documentation',
                  'id': 'dotnet-docs:' + rel,
                  'title': title,
                  'summary': description,
                  'url': url,
                  'type': str(meta.get('ms.topic') or 'documentation'),
              })
          deduped = []
          seen = set()
          for item in rows:
              key = item['url'].rstrip('/').casefold()
              if key in seen:
                  continue
              seen.add(key)
              deduped.append(item)
          with open('catalogs/dotnet-documentation.json', 'w', encoding='utf-8') as f:
              json.dump(deduped, f, ensure_ascii=False)
          with open('catalogs/stats.json', 'w') as f:
              json.dump({'total': len(deduped)}, f, indent=2)
          print({'total': len(deduped)})
          PY
      - name: Upload catalog
        uses: actions/upload-artifact@v4
        with:
          name: official-dotnet-documentation-catalog
          path: catalogs/
          retention-days: 1
