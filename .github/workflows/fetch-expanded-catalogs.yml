name: Fetch achievement registry
on:
  pull_request:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch Microsoft Learn achievement registry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p catalogs
          curl --fail --location --retry 4 --compressed \
            'https://raw.githubusercontent.com/MicrosoftDocs/learn/main/learn-pr/achievements.yml' \
            --output catalogs/microsoft-learn-achievements.yml
          wc -l catalogs/microsoft-learn-achievements.yml
      - name: Upload registry
        uses: actions/upload-artifact@v4
        with:
          name: microsoft-learn-achievements
          path: catalogs/
          retention-days: 1
