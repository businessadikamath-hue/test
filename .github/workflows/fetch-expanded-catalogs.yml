name: Fetch official Khan Academy catalog
on:
  pull_request:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch and normalize official Khan Academy catalog
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet requests
          mkdir -p catalogs
          python - <<'PY'
          import json, requests
          s=requests.Session(); s.headers['User-Agent']='OpportunityRadarCatalogAudit/1.0'
          endpoints=[
            'https://www.khanacademy.org/api/v1/topictree',
            'https://www.khanacademy.org/api/internal/graphql/ContentForPath',
          ]
          stats={}; data=None; used=None
          for u in endpoints[:1]:
              try:
                  r=s.get(u,timeout=180); stats[u]={'status':r.status_code,'bytes':len(r.content)}
                  r.raise_for_status(); data=r.json(); used=u; break
              except Exception as e: stats[u]={'error':repr(e)}
          if data is not None:
              json.dump(data,open('catalogs/khan-academy-topictree.json','w',encoding='utf-8'),ensure_ascii=False)
              nodes=[]
              def walk(x):
                  if isinstance(x,dict):
                      kind=x.get('kind') or x.get('node_kind') or x.get('type')
                      title=x.get('title') or x.get('translated_title') or x.get('display_name')
                      url=x.get('ka_url') or x.get('url') or x.get('relative_url')
                      ident=x.get('id') or x.get('slug') or x.get('node_slug')
                      if kind and title and (ident or url):
                          nodes.append({'id':ident,'kind':kind,'title':title,'description':x.get('description') or x.get('translated_description') or '', 'url':url})
                      for v in x.values(): walk(v)
                  elif isinstance(x,list):
                      for v in x: walk(v)
              walk(data)
              ded=[]; seen=set()
              for x in nodes:
                  k=(str(x.get('id') or ''),str(x.get('url') or ''),str(x.get('title') or ''))
                  if k in seen: continue
                  seen.add(k); ded.append(x)
              json.dump(ded,open('catalogs/khan-academy-content.json','w',encoding='utf-8'),ensure_ascii=False)
              stats['normalized_items']=len(ded); stats['used_endpoint']=used
          json.dump(stats,open('catalogs/stats.json','w'),indent=2)
          print(json.dumps(stats,indent=2))
          PY
      - name: Upload catalog
        uses: actions/upload-artifact@v4
        with:
          name: official-khan-academy-catalog
          path: catalogs/
          retention-days: 1
