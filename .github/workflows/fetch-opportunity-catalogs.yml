name: Fetch opportunity catalogs
on:
  push:
    branches:
      - catalog-fetch-20260716
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch Microsoft Learn catalog
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p catalogs
          curl --fail --location --retry 4 --retry-delay 3 --compressed \
            'https://learn.microsoft.com/api/catalog/' \
            --output catalogs/microsoft-learn-catalog.json
          python - <<'PY'
          import json
          p='catalogs/microsoft-learn-catalog.json'
          with open(p, encoding='utf-8') as f:
              data=json.load(f)
          print({k: len(v) for k,v in data.items() if isinstance(v,list)})
          PY
      - name: Upload catalogs
        uses: actions/upload-artifact@v4
        with:
          name: official-opportunity-catalogs
          path: catalogs/
          retention-days: 1
